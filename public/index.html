<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniZone - Baca Manga</title>
  <meta name="description" content="Baca manga, manhwa, dan manhua gratis di AniZone">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/views.css">
</head>
<body>

  <!-- SCROLL PROGRESS BAR (reader) -->
  <div id="reader-progress-bar"></div>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="logo" onclick="router.go('home')">AniZone</div>
    <div class="nav-links">
      <button class="nav-btn" id="nav-home"     onclick="homeController.load()">Home</button>
      <button class="nav-btn" id="nav-browse"   onclick="browseController.load()">Browse</button>
      <button class="nav-btn" id="nav-trending" onclick="trendingController.load()">Trending</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Cari manga..."
             onkeydown="if(event.key==='Enter') searchController.run()">
      <button onclick="searchController.run()">🔍</button>
    </div>
  </nav>

  <main>
    <!-- HOME -->
    <div id="view-home" class="view">
      <div class="section-header">
        <div class="section-title">🕐 Terbaru</div>
        <button class="see-more" onclick="browseController.load()">Lihat semua →</button>
      </div>
      <div class="comic-grid" id="grid-latest"></div>

      <div class="section-header" style="margin-top:2rem">
        <div class="section-title">🔥 Populer</div>
      </div>
      <div class="comic-grid" id="grid-popular"></div>
    </div>

    <!-- BROWSE -->
    <div id="view-browse" class="view" style="display:none">
      <div class="filter-row" id="type-filter">
        <button class="filter-chip active" onclick="browseController.setType('',this)">Semua</button>
        <button class="filter-chip" onclick="browseController.setType('manga',this)">Manga</button>
        <button class="filter-chip" onclick="browseController.setType('manhwa',this)">Manhwa</button>
        <button class="filter-chip" onclick="browseController.setType('manhua',this)">Manhua</button>
      </div>
      <div class="comic-grid" id="grid-browse"></div>
      <div class="pagination" id="browse-pages"></div>
    </div>

    <!-- TRENDING -->
    <div id="view-trending" class="view" style="display:none">
      <div class="section-header">
        <div class="section-title">🔥 Trending Comics</div>
      </div>
      <div class="comic-grid" id="grid-trending"></div>
    </div>

    <!-- SEARCH -->
    <div id="view-search" class="view" style="display:none">
      <button class="back-btn" onclick="router.back()">← Kembali</button>
      <div class="section-header">
        <div class="section-title" id="search-heading">Hasil Pencarian</div>
      </div>
      <div class="comic-grid" id="grid-search"></div>
    </div>

    <!-- DETAIL -->
    <div id="view-detail" class="view" style="display:none">
      <button class="back-btn" onclick="router.back()">← Kembali</button>
      <div id="detail-content"></div>
    </div>

    <!-- READER -->
    <div id="view-reader" class="view" style="display:none">
      <div class="reader-nav reader-nav-sticky">
        <button class="back-btn" style="margin:0" onclick="readerController.backToDetail()">← Detail</button>
        <div class="reader-title" id="reader-title"></div>
        <div style="display:flex;gap:0.4rem">
          <button class="reader-nav-btn" id="btn-prev-chap" onclick="readerController.navigate(-1)">← Prev</button>
          <button class="reader-nav-btn" id="btn-next-chap" onclick="readerController.navigate(1)">Next →</button>
        </div>
      </div>
      <div class="reader-images" id="reader-images"></div>
      <div class="reader-nav" style="margin-top:1rem">
        <button class="reader-nav-btn" onclick="readerController.navigate(-1)">← Chapter Sebelumnya</button>
        <div></div>
        <button class="reader-nav-btn" onclick="readerController.navigate(1)">Chapter Selanjutnya →</button>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/controllers.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
